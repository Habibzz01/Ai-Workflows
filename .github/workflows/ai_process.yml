name: Ollama Terminal Action

on:
  workflow_dispatch:
    inputs:
      user_prompt:
        description: 'Tulis pertanyaanmu di sini'
        required: true
        default: 'Halo AI, apa kabar?'

# PENTING: Memberikan izin agar bot bisa menulis file ke repository
permissions:
  contents: write

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ambil histori penuh agar tidak error saat push

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama & Run Model
        run: |
          # Jalankan server
          ollama serve & 
          
          # Tunggu server siap
          until curl -s localhost:11434/api/tags > /dev/null; do
            echo "Menunggu Ollama..."
            sleep 2
          done
          
          # Jalankan AI dan simpan ke file sementara
          PROMPT="${{ github.event.inputs.user_prompt }}"
          ollama run tinyllama "$PROMPT" > ai_answer.txt

      - name: Create or Update LOG_CHAT.md
        run: |
          # Ambil konten jawaban
          ANSWER=$(cat ai_answer.txt)
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          # Tambahkan ke file LOG_CHAT.md (membuat baru jika belum ada)
          echo -e "## Chat pada $DATE\n\n**User:** ${{ github.event.inputs.user_prompt }}\n\n**AI:** $ANSWER\n\n---\n" >> LOG_CHAT.md

      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LOG_CHAT.md
          git commit -m "AI: Menambahkan jawaban ke log" || exit 0
          git push
