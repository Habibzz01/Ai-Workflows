name: Ollama Terminal Action

on:
  # Memungkinkan kamu mengetik prompt langsung di dashboard GitHub
  workflow_dispatch:
    inputs:
      user_prompt:
        description: 'Tulis pertanyaanmu untuk AI di sini'
        required: true
        default: 'Siapakah itu jule trulala?'

jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Izin agar bot bisa simpan jawaban ke file

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          # Install Ollama secara resmi
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama & Run Model
        run: |
          # Jalankan server di background
          ollama serve & 
          
          # Tunggu sampai server siap
          echo "Sedang menyiapkan Ollama..."
          until curl -s localhost:11434/api/tags > /dev/null; do
            sleep 2
          done
          
          # Ambil input dari user dan jalankan TinyLlama (Ringan & Cepat)
          PROMPT="${{ github.event.inputs.user_prompt }}"
          echo "--- PERTANYAAN ---"
          echo "$PROMPT"
          echo "------------------"
          
          # Jalankan AI dan tampilkan hasilnya di log Terminal GitHub
          ollama run tinyllama "$PROMPT" | tee ai_answer.txt
          
          echo "------------------"
          echo "Proses Selesai!"

      - name: Save Result to Repository
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "ai-bot@github.com"
          
          # Simpan jawaban ke file LOG_CHAT.md agar bisa dibaca di repo
          echo -e "\n### User: ${{ github.event.inputs.user_prompt }}\n**AI:** $(cat ai_answer.txt)\n" >> LOG_CHAT.md
          
          git add LOG_CHAT.md
          git commit -m "AI: Menjawab pertanyaan baru" || exit 0
          git push
