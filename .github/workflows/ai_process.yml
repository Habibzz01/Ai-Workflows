name: Ollama Automation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Memungkinkan kamu menjalankan manual dari tab Actions

jobs:
  ollama-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama Server
        run: |
          # Jalankan server di background
          ollama serve & 
          # Tunggu sebentar sampai server siap
          sleep 10 

      - name: Pull Model and Run Query
        run: |
          # Menggunakan tinyllama agar cepat dan ringan di CPU
          ollama pull tinyllama
          
          echo "--- Pertanyaan: Apa itu GitHub Actions? ---" > log.txt
          ollama run tinyllama "Jelaskan apa itu GitHub Actions secara singkat dalam Bahasa Indonesia" >> log.txt
          
          echo -e "\n--- Selesai pada: $(date) ---" >> log.txt

      - name: Show Result in Logs
        run: cat log.txt

      - name: Upload log.txt as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollama-output-log
          path: log.txt
